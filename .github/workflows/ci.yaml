name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6.1.0
      with:
        python-version: '3.12.3'

    - name: Install dependencies
      run: |
        make setup

    - name: Lint
      run: |
        make lint

    - name: Test
      run: |
        make test_ci